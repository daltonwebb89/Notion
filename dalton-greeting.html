<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greeting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #191919;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 1.2rem 1.8rem;
    }
    .wrap { opacity: 0; animation: fadeIn 0.6s ease 0.05s forwards; }
    .greeting {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.85rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .meta {
      margin-top: 0.28rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.68rem;
      font-weight: 400;
      color: #6b6b6b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="greeting" id="greeting"></div>
    <div class="meta" id="meta"></div>
  </div>
  <script>
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const now  = new Date();
    const h    = now.getHours();
    const word = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = `${word}, Dalton.`;
    document.getElementById('meta').textContent = `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()} · St. Louis`;
  </script>
</body>
</html>
