
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, system-ui, sans-serif); }

  .timer-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.25rem 1.5rem;
    max-width: 680px;
  }

  .timer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .timer-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
  }

  .timer-display {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .timer-block {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .timer-num {
    font-size: 28px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
    min-width: 2ch;
    text-align: center;
  }

  .timer-label {
    font-size: 11px;
    color: var(--color-text-secondary);
    text-transform: lowercase;
    letter-spacing: 0.03em;
  }

  .timer-sep {
    font-size: 24px;
    font-weight: 400;
    color: var(--color-text-secondary);
    margin: 0 2px;
    align-self: flex-start;
    padding-top: 2px;
  }

  .timer-expired {
    font-size: 16px;
    font-weight: 500;
    color: var(--color-text-danger);
  }

  .toggle-row {
    margin-top: 1rem;
    border-top: 0.5px solid var(--color-border-tertiary);
    padding-top: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

  .toggle-btn {
    background: none;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 3px 10px;
    font-size: 12px;
    color: var(--color-text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .toggle-btn:hover { background: var(--color-background-secondary); }

  .toggle-arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-size: 10px;
  }
  .toggle-arrow.open { transform: rotate(90deg); }

  .edit-panel {
    display: none;
    margin-top: 0.75rem;
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 0.75rem 1rem;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  .edit-panel.visible { display: flex; }

  .field-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .field-label {
    font-size: 12px;
    color: var(--color-text-secondary);
    min-width: 70px;
  }

  .field-input {
    flex: 1;
    min-width: 140px;
    font-size: 13px;
    padding: 5px 8px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
  }

  .field-input:focus {
    outline: none;
    border-color: var(--color-border-primary);
  }

  .save-btn {
    align-self: flex-end;
    background: none;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 5px 14px;
    font-size: 12px;
    color: var(--color-text-primary);
    cursor: pointer;
  }
  .save-btn:hover { background: var(--color-background-primary); }

  .progress-bar-wrap {
    margin-top: 0.75rem;
    background: var(--color-background-secondary);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--color-text-secondary);
    transition: width 1s linear;
  }

  .progress-bar-fill.warning { background: #BA7517; }
  .progress-bar-fill.danger  { background: #A32D2D; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }

  .meta-text {
    font-size: 11px;
    color: var(--color-text-secondary);
  }

  .notion-note {
    margin-top: 0.6rem;
    font-size: 11px;
    color: var(--color-text-secondary);
    border: 0.5px dashed var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 6px 10px;
    line-height: 1.5;
  }
</style>

<div class="timer-card">
  <div class="timer-header">
    <span class="timer-title" id="display-title">Project Submission Deadline</span>
    <div class="timer-display" id="timer-display"></div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="meta-row">
    <span class="meta-text" id="meta-from"></span>
    <span class="meta-text" id="meta-pct"></span>
  </div>

  <div class="toggle-row" onclick="togglePanel()">
    <button class="toggle-btn">
      <span class="toggle-arrow" id="toggle-arrow">▶</span> Customise
    </button>
  </div>

  <div class="edit-panel" id="edit-panel">
    <div class="field-row">
      <span class="field-label">Title</span>
      <input class="field-input" id="input-title" type="text" value="Project Submission Deadline" />
    </div>
    <div class="field-row">
      <span class="field-label">Date from</span>
      <input class="field-input" id="input-from" type="date" />
    </div>
    <div class="field-row">
      <span class="field-label">Date due</span>
      <input class="field-input" id="input-due" type="date" />
    </div>
    <button class="save-btn" onclick="applySettings()">Apply</button>
  </div>

  <div class="notion-note" id="notion-note">
    <strong>Embedding in Notion:</strong> paste this file's URL into a Notion page and select <em>Embed</em>. Host the HTML file on any static host (e.g. GitHub Pages, Netlify, Tiiny.host).
  </div>
</div>

<script>
  const state = {
    title: "Project Submission Deadline",
    from: null,
    due: null
  };

  function pad(n) { return String(n).padStart(2, '0'); }

  function setDefaultDates() {
    const now = new Date();
    const due = new Date(now);
    due.setDate(due.getDate() + 30);
    state.from = now;
    state.due = due;
    document.getElementById('input-from').value = toInputDate(now);
    document.getElementById('input-due').value = toInputDate(due);
  }

  function toInputDate(d) {
    return d.toISOString().split('T')[0];
  }

  function togglePanel() {
    const panel = document.getElementById('edit-panel');
    const arrow = document.getElementById('toggle-arrow');
    const open = panel.classList.toggle('visible');
    arrow.classList.toggle('open', open);
  }

  function applySettings() {
    const t = document.getElementById('input-title').value.trim();
    const f = document.getElementById('input-from').value;
    const d = document.getElementById('input-due').value;
    if (t) state.title = t;
    if (f) state.from = new Date(f + 'T00:00:00');
    if (d) state.due  = new Date(d + 'T23:59:59');
    document.getElementById('display-title').textContent = state.title;
    tick();
  }

  function tick() {
    const display = document.getElementById('timer-display');
    const fill    = document.getElementById('progress-fill');
    const metaFrom = document.getElementById('meta-from');
    const metaPct  = document.getElementById('meta-pct');

    const now  = new Date();
    const due  = state.due;
    const from = state.from;

    if (!due) { display.innerHTML = '<span class="timer-expired">Set a due date</span>'; return; }

    const diff = due - now;

    if (from && due) {
      const total = due - from;
      const elapsed = now - from;
      const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
      fill.style.width = pct.toFixed(1) + '%';
      fill.className = 'progress-bar-fill' + (pct >= 90 ? ' danger' : pct >= 70 ? ' warning' : '');
      metaFrom.textContent = 'From ' + from.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
      metaPct.textContent  = Math.round(pct) + '% elapsed';
    }

    if (diff <= 0) {
      display.innerHTML = '<span class="timer-expired">Deadline passed</span>';
      fill.style.width = '100%';
      fill.className = 'progress-bar-fill danger';
      return;
    }

    const totalHours = Math.floor(diff / (1000 * 60 * 60));
    const days  = Math.floor(totalHours / 24);
    const hours = totalHours % 24;

    display.innerHTML =
      '<div class="timer-block"><span class="timer-num">' + days + '</span><span class="timer-label">days</span></div>' +
      '<span class="timer-sep">:</span>' +
      '<div class="timer-block"><span class="timer-num">' + pad(hours) + '</span><span class="timer-label">hours</span></div>';
  }

  setDefaultDates();
  tick();
  setInterval(tick, 60000);
</script>
