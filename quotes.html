<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rotating Quotes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-page:       #0f1623;
    --bg-card:       #1a2235;
    --bg-panel:      #141c2e;
    --bg-input:      #0f1623;
    --border:        rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    --text-primary:  #e8edf5;
    --text-secondary:#8a9ab8;
    --text-hint:     #56657f;
    --accent:        #4f7ef8;
    --accent-dim:    rgba(79,126,248,0.15);
    --radius-card:   12px;
    --radius-sm:     6px;
  }
  body {
    background: var(--bg-page);
    font-family: system-ui, -apple-system, sans-serif;
    padding: 1.25rem;
    min-height: 100vh;
  }

  .wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    overflow: hidden;
  }

  /* ── BAR ── */
  .quote-bar {
    background: var(--bg-card);
    padding: 0.6rem 0.9rem 0;
    display: flex;
    flex-direction: column;
  }

  .bar-top {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 0.55rem;
  }

  .bar-main { flex: 1; overflow: hidden; }

  .bar-text {
    font-size: 13px;
    font-style: italic;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .bar-attr {
    font-size: 10px;
    color: var(--text-hint);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chevron-btn {
    background: none;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    width: 26px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    font-family: inherit;
    line-height: 1;
  }
  .chevron-btn:hover { background: rgba(255,255,255,0.06); }

  .chevron {
    display: inline-block;
    transition: transform 0.2s;
  }
  .chevron.open { transform: rotate(180deg); }

  .progress-track {
    height: 2px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s linear;
  }

  /* ── DROPDOWN ── */
  .dropdown {
    display: none;
    flex-direction: column;
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
  }
  .dropdown.open { display: flex; }

  .drop-section {
    padding: 0.85rem 0.9rem;
  }
  .drop-section + .drop-section {
    border-top: 0.5px solid var(--border);
  }

  .section-lbl {
    font-size: 10px;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .quote-item {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 9px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }
  .quote-item:last-child { margin-bottom: 0; }
  .qi-body { flex: 1; overflow: hidden; }
  .qi-text { font-size: 12px; color: var(--text-primary); font-style: italic; line-height: 1.4; }
  .qi-attr { font-size: 10px; color: var(--text-hint); margin-top: 2px; }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-hint);
    cursor: pointer;
    font-size: 14px;
    padding: 1px 3px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1;
    font-family: inherit;
  }
  .remove-btn:hover { color: #c03030; background: rgba(192,48,48,0.12); }

  .add-block {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 0.5px solid var(--border);
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .field-row:last-of-type { margin-bottom: 0; }

  .field-lbl {
    font-size: 10px;
    color: var(--text-secondary);
    min-width: 64px;
  }

  .field-input {
    flex: 1;
    font-size: 12px;
    padding: 4px 8px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--bg-input);
    color: var(--text-primary);
    font-family: inherit;
  }
  .field-input:focus { outline: none; border-color: var(--accent); }

  textarea.field-input {
    resize: vertical;
    min-height: 46px;
    line-height: 1.4;
  }

  .btn-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
  }

  .apply-btn {
    background: var(--accent-dim);
    border: 0.5px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 4px 14px;
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    font-family: inherit;
  }
  .apply-btn:hover { background: rgba(79,126,248,0.28); }

  .interval-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }
  .interval-val { font-size: 11px; font-weight: 500; color: var(--text-primary); min-width: 28px; }

  .empty-msg { font-size: 12px; color: var(--text-hint); text-align: center; padding: 0.5rem 0; }
</style>
</head>
<body>

<div class="wrap">
  <div class="quote-bar">
    <div class="bar-top">
      <div class="bar-main">
        <div class="bar-text" id="qt">Loading...</div>
        <div class="bar-attr" id="qa"></div>
      </div>
      <button class="chevron-btn" onclick="toggleDropdown()">
        <span class="chevron" id="chevron">&#8964;</span>
      </button>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog" style="width:0%"></div>
    </div>
  </div>

  <div class="dropdown" id="dropdown">

    <div class="drop-section">
      <p class="section-lbl">Quotes</p>
      <div id="quote-list"></div>
      <div class="add-block">
        <p class="section-lbl">Add a quote</p>
        <div class="field-row">
          <span class="field-lbl">Quote</span>
          <textarea class="field-input" id="new-quote" placeholder="Enter quote text..."></textarea>
        </div>
        <div class="field-row">
          <span class="field-lbl">Attribution</span>
          <input class="field-input" type="text" id="new-attr" placeholder="— Author (optional)" />
        </div>
        <div class="btn-row">
          <button class="apply-btn" onclick="addQuote()">Add quote</button>
        </div>
      </div>
    </div>

    <div class="drop-section">
      <p class="section-lbl">Rotation interval</p>
      <div class="interval-row">
        <input type="range" min="3" max="30" step="1" id="interval-slider" oninput="updateInterval(this.value)" />
        <span class="interval-val" id="interval-val">8s</span>
      </div>
    </div>

  </div>
</div>

<script>
const STORAGE_KEY = 'rotating_quotes_v1';

const defaults = [
  { text: "The details are not the details. They make the design.", attr: "— Charles Eames" },
  { text: "To design is to communicate clearly by whatever means you can control or master.", attr: "— Milton Glaser" },
  { text: "Simplicity is not the absence of clutter, but the absence of anything unnecessary.", attr: "— Dieter Rams" }
];

var data = { quotes: [], interval: 8 };
var current = 0;
var timer = null;
var progTimer = null;
var progStart = null;
var open = false;

function load() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) data = JSON.parse(raw);
    else data = { quotes: defaults.map(function(q){ return { text: q.text, attr: q.attr }; }), interval: 8 };
  } catch(e) {
    data = { quotes: defaults.map(function(q){ return { text: q.text, attr: q.attr }; }), interval: 8 };
  }
  render();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function render() {
  renderBar();
  renderList();
  document.getElementById('interval-slider').value = data.interval;
  document.getElementById('interval-val').textContent = data.interval + 's';
}

function renderBar() {
  var q = data.quotes;
  if (!q.length) {
    document.getElementById('qt').textContent = 'No quotes yet \u2014 open \u2228 to add some.';
    document.getElementById('qa').textContent = '';
    document.getElementById('prog').style.width = '0%';
    return;
  }
  if (current >= q.length) current = 0;
  document.getElementById('qt').textContent = '\u201C' + q[current].text + '\u201D';
  document.getElementById('qa').textContent = q[current].attr || '';
  resetTimer();
}

function renderList() {
  var el = document.getElementById('quote-list');
  if (!data.quotes.length) {
    el.innerHTML = '<div class="empty-msg">No quotes yet.</div>';
    return;
  }
  el.innerHTML = data.quotes.map(function(q, i) {
    return '<div class="quote-item">' +
      '<div class="qi-body">' +
        '<div class="qi-text">\u201C' + esc(q.text) + '\u201D</div>' +
        (q.attr ? '<div class="qi-attr">' + esc(q.attr) + '</div>' : '') +
      '</div>' +
      '<button class="remove-btn" onclick="removeQuote(' + i + ')">\xd7</button>' +
    '</div>';
  }).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function resetTimer() {
  clearInterval(timer);
  clearInterval(progTimer);
  progStart = Date.now();
  updateProgress();
  if (data.quotes.length > 1) {
    timer = setInterval(function() {
      current = (current + 1) % data.quotes.length;
      progStart = Date.now();
      renderBar();
    }, data.interval * 1000);
    progTimer = setInterval(updateProgress, 500);
  }
}

function updateProgress() {
  if (!progStart || !data.quotes.length) return;
  var elapsed = (Date.now() - progStart) / 1000;
  var pct = Math.min(100, (elapsed / data.interval) * 100);
  document.getElementById('prog').style.width = pct.toFixed(1) + '%';
}

function toggleDropdown() {
  open = !open;
  document.getElementById('dropdown').classList.toggle('open', open);
  document.getElementById('chevron').classList.toggle('open', open);
}

function updateInterval(v) {
  data.interval = parseInt(v);
  document.getElementById('interval-val').textContent = v + 's';
  save();
  resetTimer();
}

function addQuote() {
  var text = document.getElementById('new-quote').value.trim();
  var attr = document.getElementById('new-attr').value.trim();
  if (!text) return;
  data.quotes.push({ text: text, attr: attr });
  document.getElementById('new-quote').value = '';
  document.getElementById('new-attr').value = '';
  save();
  render();
}

function removeQuote(i) {
  data.quotes.splice(i, 1);
  if (current >= data.quotes.length) current = Math.max(0, data.quotes.length - 1);
  save();
  render();
}

load();
</script>
</body>
</html>
